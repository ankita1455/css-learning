<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filters</title>
    <style>
      /*  img{
            filter:blur(5px);
        }*/
        .img1{
         filter: brightness(120%) contrast(200%);
        }
        .img2{
        filter:grayscale(40%);
        }
        .img3{
         filter: drop-shadow(16px 16px 20px blue);
        }
    </style>
</head>
<body>
   <div class="container">
<img class="img1" src="https://images.unsplash.com/photo-1633621412960-6df85eff8c85?q=80&w=327&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
<img class="img2" src="https://i.pinimg.com/736x/98/6b/66/986b669c405739abf9f9ad16b3a1a088.jpg">
<img class="img3" src="https://i.pinimg.com/736x/db/c2/e6/dbc2e6f9d938d6591880fa56f5e736a9.jpg">
   </div> 
</body>
</html>
