<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css selectors</title>
    <style>
        /*element selector*/
        div{
            background-color:red;
        }
        /*class selector*/
        .pink{
            background-color:yellow;
        }
/*id selector*/
        #green{
            background-color:green;
        }
        /*child selector*/
div>p{
    color:blue;
    background-color:brown;
}
/*universal selector*/
*{
    margin:0;
    padding:0;
}
/*pseudo selector*/
a:visited{
    color:yellow
}
a:link{
    color:green
}
a:active{
    background-color:red
}
a:hover{
    background-color:yellow;
}
    </style>
</head>
<body>
    <div>i am a div
        <p>i m a para in div</p>
    </div>
    <div class="pink">i am an another div
    </div>
    <span id="green">
these are css selectors
    </span>

    <a href="https://www.google.com">Go to google</a>
    <a href="https://www.facebook2.com">Go to facebook</a></br>
</body>
</html>
