<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css flexbox</title>
    <style>
       .container{
        border:2px solid red;
        height:80vh;
        display:flex;
       /*justify-content: center;*/
        align-items: center;
       /*flex-direction: column-reverse;*/
       flex-wrap: wrap;
       /*align-content: centre;*/
       /*this is no justify-items in flexbox*/
       flex-flow: row wrap;
       /*gap: 20px;
       row-gap: 40px;
       column-gap: 10px;*/
       gap: 40px 10px;
       }
       .item{
        height:62px;
        width:62px;
        border:2px solid black;
        margin:4px;
        background-color:blueviolet;
       }
       .order-1{
        order:1
       }
       .order-2{
        order:2
       }
       .order-3{
        order:3
       }
       .item1{
       /*flex-grow: 4;
       flex-shrink: 2;*/
       align-self: flex-end;
       }
       
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item item1">1</div>
            <div class="item order-1">2</div>
            <div class="item order-1">3</div>
            
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            
          
        </div>
    </main>
</body>
</html>
