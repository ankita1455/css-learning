<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid red;
            padding: 34px;
            box-shadow: 4px 6px 15px 1px #4006aa;
        }
        .text-element{
            text-shadow:2px 2px 4px #1bd11b;
            outline:2px solid blue;
            border:2px solid red;
            outline-offset: 22px;
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Consequatur ut optio sed accusantium, totam quam in quod ea ullam saepe magni voluptatum at omnis similique modi praesentium quos, facilis commodi?
    </p>
</body>
</html>
