<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box1{
            background-color: aqua;
            position:sticky;
            top:0px;
            height:111px;
            width:100%;
            margin:0;
            padding:0;

           /*position:absolute;
           top:0px;*/
        }
        .box2{
          /*  position:relative;
            top:34px;
            left:56px;*/
            background-color: palegreen;
        }
        .box3{
            background-color: aquamarine;
           /* position:fixed;
            bottom:0;
            left:25vw;*/
        }
        .box4{
            background-color: purple;
        }
        .box{
            height:233px;
            width:80vw;
            margin:3px;
            padding:3px;
            border:2px solid black;
        }
        .parent{
            margin:43px;
            padding:34px;
            border:3px solid red;
           /* position:absolute;*/

        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
</body>
</html>
